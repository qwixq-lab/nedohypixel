<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Недохайпиксель | Главная</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #00d2ff;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #000; color: white;
            min-height: 100vh; overflow-x: hidden;
            display: flex; flex-direction: column;
        }

        /* Эффект шиммера на фоне */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(125deg, transparent 30%, rgba(255,255,255,0.02) 50%, transparent 70%);
            background-size: 200% 200%;
            animation: bgShimmer 8s infinite linear;
            pointer-events: none; z-index: 0;
        }

        @keyframes bgShimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        /* Навигация */
        nav {
            width: 90%; max-width: 1000px; margin: 20px auto; padding: 15px 30px;
            background: var(--glass); backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border); border-radius: 20px;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 20px; z-index: 100;
        }

        /* Логотип-ссылка */
        .logo-link {
            text-decoration: none; color: white; font-weight: bold;
            letter-spacing: 2px; cursor: pointer; transition: 0.3s;
        }
        .logo-link:hover { color: var(--accent); }

        .nav-right { display: flex; align-items: center; gap: 20px; }
        
        .tg-link {
            display: flex; align-items: center; background: rgba(0, 136, 204, 0.15);
            border: 1px solid rgba(0, 136, 204, 0.3); padding: 8px 15px; border-radius: 12px;
            text-decoration: none; color: white; transition: 0.3s; font-size: 0.8rem;
        }
        .tg-link:hover { background: #0088cc; box-shadow: 0 0 15px #0088cc; }
        .tg-icon { width: 18px; height: 18px; margin-right: 8px; }

        .hero {
            flex: 1; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
            padding: 100px 20px; z-index: 1;
        }

        .main-cards { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; margin-top: 40px; }

        .glass-card {
            background: var(--glass); border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px); border-radius: 25px; padding: 40px;
            width: 280px; transition: 0.4s;
        }
        .glass-card:hover { transform: translateY(-10px); border-color: var(--accent); }

        /* Секция серверов */
        .servers-section {
            padding: 80px 20px; display: flex; flex-direction: column; align-items: center; z-index: 1;
        }

        .ip-card {
            background: rgba(255,255,255,0.02); border: 1px solid #222;
            width: 100%; max-width: 600px; margin: 10px; padding: 20px;
            border-radius: 18px; display: flex; justify-content: space-between; align-items: center;
        }

        /* Маленькие приписки */
        .server-tag {
            font-size: 0.65rem; color: #555; text-transform: uppercase;
            letter-spacing: 1px; margin-bottom: 4px;
        }

        .ip-text { font-family: monospace; color: var(--accent); font-size: 1.1rem; }

        .btn-copy {
            background: var(--accent); color: #000; border: none; padding: 10px 20px;
            border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s;
        }
        .btn-copy:hover { transform: scale(1.05); }

        .btn-main {
            margin-top: 20px; padding: 12px 25px; background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border); border-radius: 10px; color: white;
            cursor: pointer; width: 100%; font-weight: bold; transition: 0.3s;
        }
        .btn-main:hover { background: white; color: black; }

        /* Модалка */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(10px);
            display: none; justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-content {
            background: #111; border: 1px solid var(--accent); padding: 30px;
            border-radius: 20px; width: 90%; max-width: 400px; text-align: center;
        }

        footer { padding: 40px 0; text-align: center; z-index: 1; opacity: 0.2; font-size: 0.8rem; letter-spacing: 2px; }
    </style>
</head>
<body>

    <nav>
        <!-- Лого теперь ссылка на верх страницы -->
        <a onclick="window.scrollTo({top: 0, behavior: 'smooth'})" class="logo-link">НЕДОХАЙПИКСЕЛЬ</a>
        
        <div class="nav-right">
            <a onclick="document.getElementById('ips').scrollIntoView({behavior: 'smooth'})" style="color: white; text-decoration: none; cursor: pointer; font-size: 0.9rem; opacity: 0.7; margin-right: 15px;">Сервера</a>
            <a href="https://t.me/qwiqxtyanski" target="_blank" class="tg-link">
                <svg class="tg-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69.01-.03.01-.14-.07-.2s-.21-.05-.3-.03c-.11.02-1.92 1.21-5.41 3.57-.51.35-.97.52-1.38.51-.45-.01-1.32-.26-1.97-.47-.79-.26-1.42-.4-1.36-.85.03-.24.33-.48.89-.74 3.48-1.51 5.81-2.52 6.99-3.01 3.32-1.4 4.01-1.64 4.46-1.65.1 0 .32.02.47.14.12.1.16.24.18.33.01.08.02.23.01.37z"/></svg>
                Написать мне
            </a>
        </div>
    </nav>

    <div class="hero">
        <h1 style="font-size: 3.5rem; margin: 0;">Сборки и Файлы</h1>
        <p style="opacity: 0.4; margin-top: 10px;">Проект Недохайпиксель</p>
        
        <div class="main-cards">
            <div class="glass-card">
                <h2>📦 Сборки</h2>
                <button class="btn-main" onclick="openModal('mods')">Открыть</button>
            </div>
            <div class="glass-card">
                <h2>✨ Шейдеры</h2>
                <button class="btn-main" onclick="openModal('shaders')">Выбрать</button>
            </div>
        </div>
    </div>

    <div class="servers-section" id="ips">
        <h2 style="margin-bottom: 40px; letter-spacing: 1px;">Наши сервера</h2>
        
        <!-- Сервер 1 -->
        <div class="ip-card">
            <div>
                <div class="server-tag">сервер 1.20.1 (моды)</div>
                <div class="ip-text" id="ip1">mc.nedohypixel.ru</div>
            </div>
            <button class="btn-copy" onclick="copyIP('ip1', this)">КОПИРОВАТЬ</button>
        </div>

        <!-- Сервер 2 -->
        <div class="ip-card">
            <div>
                <div class="server-tag">сервер 1.21.11 (ванилла)</div>
                <div class="ip-text" id="ip2">vanilla.nedo.ru</div>
            </div>
            <button class="btn-copy" onclick="copyIP('ip2', this)">КОПИРОВАТЬ</button>
        </div>

        <!-- Сервер 3 (Вернул!) -->
        <div class="ip-card">
            <div>
                <div class="server-tag">сервер 1.21.1 (new моды)</div>
                <div class="ip-text" id="ip3">new.nedo.ru</div>
            </div>
            <button class="btn-copy" onclick="copyIP('ip3', this)">КОПИРОВАТЬ</button>
        </div>
    </div>

    <div class="modal" id="modal" onclick="if(event.target == this) closeModal()">
        <div class="modal-content">
            <h2 id="modal-title" style="margin-bottom: 20px;"></h2>
            <div id="modal-list-container"></div>
            <button class="btn-main" onclick="closeModal()">Закрыть</button>
        </div>
    </div>

    <footer>By qwiqx</footer>

    <script>
        const store = {
            mods: {
                title: "Сборки модов",
                items: [
                    { name: "Сборка 1.20.1", url: "files/mods1.zip" },
                    { name: "Сборка 1.21.1", url: "files/mods2.zip" },
                    { name: "Визуальная сборка", url: "files/visual.zip" }
                ]
            },
            shaders: { title: "Шейдеры", items: [] }
        };

        function openModal(type) {
            const data = store[type];
            document.getElementById('modal-title').innerText = data.title;
            const container = document.getElementById('modal-list-container');
            if (data.items.length === 0) {
                container.innerHTML = "<p style='margin: 20px; opacity: 0.5;'>Увы, тут сборки нет</p>";
            } else {
                let html = '<div style="margin-bottom: 20px;">';
                data.items.forEach(i => {
                    html += `<a href="${i.url}" download style="display:block; padding:15px; background:#1a1a1a; margin:10px 0; border-radius:12px; color:var(--accent); text-decoration:none; border: 1px solid #333;">${i.name}</a>`;
                });
                html += '</div>';
                container.innerHTML = html;
            }
            document.getElementById('modal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        function copyIP(id, btn) {
            const text = document.getElementById(id).innerText;
            navigator.clipboard.writeText(text);
            const old = btn.innerText;
            btn.innerText = "ГОТОВО";
            btn.style.background = "#fff";
            setTimeout(() => { 
                btn.innerText = old; 
                btn.style.background = "var(--accent)";
            }, 1500);
        }
    </script>
</body>
</html>
